<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Chess | Practice</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-bg">

    <nav class="zen-navbar d-flex justify-content-between align-items-center px-4 shadow-sm">
        <div class="brand fw-bold text-light letter-space fs-4">
            <span class="text-primary">♟</span> ZEN CHESS
        </div>
        <div class="nav-tabs d-none d-md-flex gap-5">
            <a href="index.html" class="nav-tab active">Practice</a>
            <a href="vision.html" class="nav-tab">Vision Drill</a>
            <a href="dashboard.html" class="nav-tab">Dashboard</a>
        </div>
        <div class="auth-section" id="auth-section">
            <button class="btn btn-outline-light btn-sm fw-bold px-4" onclick="toggleLogin()">SIGN IN</button>
        </div>
    </nav>

    <div class="container-fluid d-flex align-items-center justify-content-center main-wrapper">
        <div class="row w-100 shadow-lg app-container rounded-4 overflow-hidden" style="max-width: 1100px;">
            <div class="col-md-8 p-0 board-section d-flex justify-content-center align-items-center position-relative py-4">
                <div id="myBoard" style="width: 90%; max-width: 550px;"></div>
            </div>

            <div class="col-md-4 p-4 control-panel d-flex flex-column">
                <div class="header mb-4 pb-3 border-bottom border-secondary text-center">
                    <span class="badge bg-primary rounded-pill mb-2">Free Practice Mode</span>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light opacity-75 fw-bold text-uppercase small" style="letter-spacing: 1px;">AI Speed</label>
                    <select id="ai-speed" class="form-select custom-select bg-dark text-light border-secondary shadow-none">
                        <option value="500">Fast (0.5s)</option>
                        <option value="1500" selected>Relaxed (1.5s)</option>
                        <option value="3000">Thoughtful (3.0s)</option>
                    </select>
                </div>

                <div class="move-log flex-grow-1 mb-4 p-3 rounded-3 d-flex flex-column">
                    <h6 class="text-light opacity-75 border-bottom border-secondary pb-2 mb-2 text-uppercase small fw-bold">Move Log</h6>
                    <div id="move-history" class="text-light opacity-50 small flex-grow-1" style="overflow-y: auto; max-height: 200px;">
                        <div class="text-center mt-4">Game starting...</div>
                    </div>
                </div>

                <div class="d-grid gap-3 mt-auto">
                    <button id="undoBtn" class="btn btn-outline-secondary text-light">Undo Last Move</button>
                    <button id="resetBtn" class="btn btn-primary fw-bold text-uppercase">New Game</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
