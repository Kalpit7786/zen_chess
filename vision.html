<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Chess | Vision Drill</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-bg">

    <nav class="zen-navbar d-flex justify-content-between align-items-center px-4 shadow-sm">
        <div class="brand fw-bold text-light letter-space fs-4">
            <span class="text-primary">♟</span> ZEN CHESS
        </div>
        <div class="nav-tabs d-none d-md-flex gap-5">
            <a href="index.html" class="nav-tab">Practice</a>
            <a href="vision.html" class="nav-tab active">Vision Drill</a>
            <a href="dashboard.html" class="nav-tab">Dashboard</a>
        </div>
        <div class="auth-section" id="auth-section">
            <button class="btn btn-outline-light btn-sm fw-bold px-4" onclick="toggleLogin()">SIGN IN</button>
        </div>
    </nav>

    <div class="container-fluid d-flex align-items-center justify-content-center main-wrapper">
        <div class="row w-100 shadow-lg app-container rounded-4 overflow-hidden" style="max-width: 1100px;">
            <div class="col-md-8 p-0 board-section d-flex justify-content-center align-items-center position-relative py-4">
                <div id="visionBoard" style="width: 90%; max-width: 550px;"></div>
            </div>

            <div class="col-md-4 p-4 control-panel d-flex flex-column">
                <div class="header mb-4 pb-3 border-bottom border-secondary text-center">
                    <span class="badge bg-danger rounded-pill mb-2">Speed Drill</span>
                    <p class="text-light opacity-75 small mt-2">Find the requested square as fast as possible.</p>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 px-3">
                    <div class="text-center">
                        <div class="text-light opacity-50 small text-uppercase fw-bold mb-1">Time Left</div>
                        <div id="vision-timer" class="text-light fw-bold fs-2">30s</div>
                    </div>
                    <div class="text-center">
                        <div class="text-light opacity-50 small text-uppercase fw-bold mb-1">Score</div>
                        <div id="vision-score" class="text-primary fw-bold fs-2">0</div>
                    </div>
                </div>

                <div class="flex-grow-1 d-flex flex-column justify-content-center align-items-center bg-dark rounded-3 border border-secondary mb-4 p-4 text-center">
                    <div class="text-light opacity-50 text-uppercase fw-bold mb-2" style="letter-spacing: 2px;">Target Square</div>
                    <div id="vision-target" class="fw-bold" style="font-size: 5rem; color: #f8fafc; line-height: 1;">--</div>
                </div>

                <div class="d-grid mt-auto">
                    <button id="startVisionBtn" class="btn btn-danger fw-bold text-uppercase py-3" style="letter-spacing: 2px;">START DRILL</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
