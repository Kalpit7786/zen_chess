<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Chess | Join the Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-bg">

    <nav class="zen-navbar d-flex justify-content-between align-items-center px-4 shadow-sm">
        <div class="brand fw-bold text-light letter-space fs-4">
            <span class="text-primary">♟</span> ZEN CHESS
        </div>
        <div class="nav-tabs d-none d-md-flex gap-5">
            <a href="index.html" class="nav-tab">Practice</a>
            <a href="vision.html" class="nav-tab">Vision Drill</a>
            <a href="dashboard.html" class="nav-tab">Dashboard</a>
        </div>
        <div class="auth-section">
            <a href="login.html" class="btn btn-outline-light btn-sm fw-bold px-4">SIGN IN</a>
        </div>
    </nav>

    <div class="container-fluid d-flex align-items-center justify-content-center main-wrapper">
        <div class="stat-card p-5 rounded-4 shadow-lg w-100" style="max-width: 400px;">
            
            <div class="text-center mb-4">
                <h2 class="text-light fw-bold mb-1 letter-space">CREATE ACCOUNT</h2>
                <p class="text-light opacity-50 small">Start your journey to Grandmaster</p>
            </div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label text-light opacity-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Username</label>
                    <input type="text" id="reg-name" class="form-control bg-dark text-light border-secondary shadow-none py-2" placeholder="e.g. Fabulous" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-light opacity-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Password</label>
                    <input type="password" id="reg-pass" class="form-control bg-dark text-light border-secondary shadow-none py-2" placeholder="••••••••" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary fw-bold py-3 text-uppercase" style="letter-spacing: 2px;">Register Now</button>
                </div>

                <div class="text-center">
                    <span class="text-light opacity-50 small">Already have an account?</span>
                    <a href="login.html" class="text-primary small fw-bold text-decoration-none ms-1">Sign In</a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
