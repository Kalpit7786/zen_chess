<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Chess | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-bg">

    <nav class="zen-navbar d-flex justify-content-between align-items-center px-4 shadow-sm">
        <div class="brand fw-bold text-light letter-space fs-4">
            <span class="text-primary">♟</span> ZEN CHESS
        </div>
        <div class="nav-tabs d-none d-md-flex gap-5">
            <a href="index.html" class="nav-tab">Practice</a>
            <a href="vision.html" class="nav-tab">Vision Drill</a>
            <a href="dashboard.html" class="nav-tab">Dashboard</a>
        </div>
        <div class="auth-section">
            <a href="register.html" class="btn btn-outline-light btn-sm fw-bold px-4">REGISTER</a>
        </div>
    </nav>

    <div class="container-fluid d-flex align-items-center justify-content-center main-wrapper">
        <div class="stat-card p-5 rounded-4 shadow-lg w-100" style="max-width: 400px;">
            
            <div class="text-center mb-4">
                <h2 class="text-light fw-bold mb-1 letter-space">WELCOME BACK</h2>
                <p class="text-light opacity-50 small">Enter your credentials to access the Hub</p>
            </div>

            <form id="loginForm">
                
                <div class="mb-3">
                    <label class="form-label text-light opacity-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Username</label>
                    <input type="text" id="login-user" class="form-control bg-dark text-light border-secondary shadow-none py-2" placeholder="Fabulous" required>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label text-light opacity-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Password</label>
                        <a href="#" class="text-primary small text-decoration-none opacity-75">Forgot?</a>
                    </div>
                    <input type="password" id="login-pass" class="form-control bg-dark text-light border-secondary shadow-none py-2" placeholder="••••••••" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary fw-bold py-3 text-uppercase" style="letter-spacing: 2px;">Sign In</button>
                </div>

                <div class="text-center">
                    <span class="text-light opacity-50 small">New to Zen Chess?</span>
                    <a href="register.html" class="text-primary small fw-bold text-decoration-none ms-1">Create Account</a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
